name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  schema:
    name: Validate schema and examples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install root deps
        run: npm ci
      - name: Validate schema and examples
        run: node scripts/validate.mjs

  build:
    name: Build app
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install app deps
        working-directory: app
        run: npm ci
      - name: Build app
        working-directory: app
        run: npm run build
